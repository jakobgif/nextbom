site_name: nextbom
site_url: https://jakobgif.github.io/nextbom/

theme:
  name: material
  palette:
    - scheme: slate
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - content.tooltips

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences

nav:
  - Overview: index.md
  - Using nextbom:
    - Projects: project.md
    - BOM Workflow: workflow.md
    - File Formats: file-formats.md
  - Development: development.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jakobgif/nextbom
